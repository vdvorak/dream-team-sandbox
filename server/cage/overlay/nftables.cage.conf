# =============================================================================
# nftables.cage.conf — vrstva 3 (in-VM firewall, DEFENSE-IN-DEPTH).
#
# WHY (CE-1): SEKUNDÁRNÍ vrstva, NIKDY jediný nositel garance. Garanci nese host-enforced
# vrstva 2 (Fly Network Policy) — root v guestu by tuhle vrstvu smazal, dokud má
# CAP_NET_ADMIN. Proto se instaluje root v kroku 1 PŘED dropem CAP_NET_ADMIN (krok 2);
# po dropu se stane neměnnou (agent: `nft flush` → EPERM, I4b/I4c/I5).
#
# Posture: default-DROP egress, allow jen loopback (proxy sidecar) + privátní síť (6PN).
# Tvar zrcadlí abstraktní ruleset H1–H7 (server/cage/policy/ruleset.py) na in-VM úrovni.
# =============================================================================
flush ruleset

table inet cage {
    chain output {
        type filter hook output priority 0; policy drop;   # H6: default-deny egress

        # stavová allow pro navázaná spojení
        ct state established,related accept

        # loopback (proxy sidecar komunikace, H1 — :443 ven jen přes proxy)
        oif "lo" accept

        # DNS na allowlisted resolver (H3). TODO-spike(heimdall): potvrdit resolver IP.
        # Hodnota se renderuje z RulesetParams.dns_resolver_ip; default link-local resolver.
        ip daddr 169.254.0.2 udp dport 53 accept
        ip daddr 169.254.0.2 tcp dport 53 accept

        # privátní síť 6PN (H2) — app↔workspace na :8081 + approved peers.
        # TODO-spike(heimdall): potvrdit 6PN CIDR (fdaa::/16 předpoklad).
        ip6 daddr fdaa::/16 accept

        # H5: blackhole metadata/link-local (side-channel). DROP (tichý zahoz).
        # TODO-spike(heimdall): potvrdit metadata rozsah.
        ip daddr 169.254.0.0/16 drop

        # H4: SSH ven NIKDY (pivot). Explicitní reject pro čitelnost (default-drop by stačil).
        tcp dport 22 drop
        # vše ostatní → policy drop (H6).
    }

    chain input {
        type filter hook input priority 0; policy drop;    # H7: žádný veřejný ingress

        ct state established,related accept
        iif "lo" accept
        # privátní síť 6PN ingress (app→workspace :8081). Žádný public ingress.
        ip6 saddr fdaa::/16 tcp dport 8081 accept
    }

    chain forward {
        type filter hook forward priority 0; policy drop;  # microVM neforwarduje
    }
}
